version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: brainydocs_db
    restart: always
    environment:
      POSTGRES_USER: brainydocs
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: brainydocs
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: brainydocs_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://brainydocs:rootpassword@db:5432/brainydocs
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: brainydocs_frontend
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  db_data:
