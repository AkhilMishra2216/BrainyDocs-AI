version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: brainydocs_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: brainydocs
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: brainydocs_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:rootpassword@db:3306/brainydocs
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: brainydocs_frontend
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  db_data:
